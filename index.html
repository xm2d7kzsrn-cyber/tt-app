<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卓球アナリティクス V11.1 修正版</title>
<script src="chart.umd.js"></script>

<style>
body{
font-family:sans-serif;
background:#f0f2f5;
margin:0;
padding:5px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:10px;
border-radius:12px;
}

.main-layout{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.player-area{
flex:1;
padding:10px;
border:3px solid #ddd;
border-radius:10px;
}

.score{
font-size:60px;
text-align:center;
}

.btn-group{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:5px;
}

/* グラフ縦配置 */
.charts{
margin-top:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.chart-row{
display:flex;
gap:10px;
}

.chart-box{
flex:1;
background:#fff;
border:1px solid #ddd;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="main-layout">

<!-- P1 -->
<div class="player-area">
<h3>自分</h3>
<div id="p1-score" class="score">0</div>

<div class="btn-group">
<button onclick="record('p1','攻撃')">攻撃</button>
<button onclick="record('p1','守備')">守備</button>
<button onclick="record('p1','ミス')">ミス</button>
<button onclick="record('p1','サーブ')">サーブ</button>
<button onclick="record('p1','得点')">得点</button>
</div>

</div>

<!-- P2 -->
<div class="player-area">
<h3>相手</h3>
<div id="p2-score" class="score">0</div>

<div class="btn-group">
<button onclick="record('p2','攻撃')">攻撃</button>
<button onclick="record('p2','守備')">守備</button>
<button onclick="record('p2','ミス')">ミス</button>
<button onclick="record('p2','サーブ')">サーブ</button>
<button onclick="record('p2','失点')">失点</button>
</div>

</div>

</div>

<button onclick="undo()">戻す</button>

<!-- ===================== -->
<!-- サーブ内訳（既存） -->
<!-- ===================== -->
<div class="charts">
<h3>サーブ内訳</h3>
<div class="chart-row">
<div class="chart-box"><canvas id="serve-p1"></canvas></div>
<div class="chart-box"><canvas id="serve-p2"></canvas></div>
</div>
</div>

<!-- ===================== -->
<!-- 得点理由（追加） -->
<!-- ===================== -->
<div class="charts">
<h3>得点理由</h3>
<div class="chart-row">
<div class="chart-box"><canvas id="reason-p1"></canvas></div>
<div class="chart-box"><canvas id="reason-p2"></canvas></div>
</div>
</div>

</div>

<script>

let p1=0,p2=0;
let log=[];

let serveChart={};
let reasonChart={};

function record(player,reason){

log.push({player,reason});

if(player==="p1")p1++;
else p2++;

update();
}

function update(){

document.getElementById("p1-score").innerText=p1;
document.getElementById("p2-score").innerText=p2;

updateServe();
updateReason();
}

/* ======================
   サーブ内訳（維持）
====================== */
function updateServe(){

if(!serveChart.p1){
serveChart.p1=new Chart(document.getElementById("serve-p1"),{
type:"pie",
data:{labels:[],datasets:[{data:[]}]}
});

serveChart.p2=new Chart(document.getElementById("serve-p2"),{
type:"pie",
data:{labels:[],datasets:[{data:[]}]}
});
}

const s1={},s2={};

log.forEach(p=>{
if(p.player==="p1") s1[p.reason]=(s1[p.reason]||0)+1;
if(p.player==="p2") s2[p.reason]=(s2[p.reason]||0)+1;
});

serveChart.p1.data.labels=Object.keys(s1);
serveChart.p1.data.datasets[0].data=Object.values(s1);
serveChart.p1.update();

serveChart.p2.data.labels=Object.keys(s2);
serveChart.p2.data.datasets[0].data=Object.values(s2);
serveChart.p2.update();
}

/* ======================
   得点理由（追加）
====================== */
function updateReason(){

if(!reasonChart.p1){
reasonChart.p1=new Chart(document.getElementById("reason-p1"),{
type:"pie",
data:{labels:[],datasets:[{data:[]}]}
});

reasonChart.p2=new Chart(document.getElementById("reason-p2"),{
type:"pie",
data:{labels:[],datasets:[{data:[]}]}
});
}

const r1={},r2={};

log.forEach(p=>{
if(p.player==="p1") r1[p.reason]=(r1[p.reason]||0)+1;
if(p.player==="p2") r2[p.reason]=(r2[p.reason]||0)+1;
});

reasonChart.p1.data.labels=Object.keys(r1);
reasonChart.p1.data.datasets[0].data=Object.values(r1);
reasonChart.p1.update();

reasonChart.p2.data.labels=Object.keys(r2);
reasonChart.p2.data.datasets[0].data=Object.values(r2);
reasonChart.p2.update();
}

function undo(){
log.pop();
if(p1>0)p1--;
else if(p2>0)p2--;
update();
}

</script>

</body>
</html>
