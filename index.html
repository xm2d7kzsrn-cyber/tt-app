<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卓球アナリティクス V12</title>
<script src="chart.umd.js"></script>

<style>
:root{
--p1:#3498db;
--p2:#e67e22;
--ok:#2ecc71;
--ng:#e74c3c;
}

body{
margin:0;
font-family:sans-serif;
background:#f0f2f5;
font-size:14px;
}

.container{
padding:10px;
max-width:900px;
margin:auto;
background:white;
}

/* 縦画面最適 */
.vertical{
display:flex;
flex-direction:column;
gap:12px;
}

/* スコア */
.scoreBox{
display:flex;
justify-content:space-around;
font-size:40px;
font-weight:bold;
}

/* ボタン */
.btn{
padding:8px;
border:none;
border-radius:6px;
font-size:12px;
margin:2px;
}

.p1{background:var(--p1);color:white;}
.p2{background:var(--p2);color:white;}
.gray{background:#ecf0f1;}

/* グラフ縦並び */
.chartWrap{
display:flex;
flex-direction:column;
gap:15px;
}

/* 自由記述 */
textarea{
width:100%;
height:60px;
margin-top:5px;
}
</style>
</head>

<body>
<div class="container vertical">

<!-- スコア -->
<div class="scoreBox">
<div id="p1s">0</div>
<div>:</div>
<div id="p2s">0</div>
</div>

<!-- 入力 -->
<div>
<button class="btn p1" onclick="point('p1','攻撃')">攻撃</button>
<button class="btn p1" onclick="point('p1','ミス')">ミス</button>

<button class="btn p2" onclick="point('p2','攻撃')">攻撃</button>
<button class="btn p2" onclick="point('p2','ミス')">ミス</button>

<br>
<textarea id="free" placeholder="自由記述（理由）"></textarea>
</div>

<!-- グラフ①（サーブ） -->
<div class="chartWrap">
<canvas id="g1"></canvas>
<canvas id="g2"></canvas>
</div>

<!-- グラフ②（内訳） -->
<div class="chartWrap">
<canvas id="g3"></canvas>
</div>

</div>

<script>
let p1=0,p2=0;
let dataLog=[];

/* ===== 得点処理（ここは絶対に壊さない） ===== */
function point(team,type){

let memo=document.getElementById("free").value;

dataLog.push({team,type,memo});

if(team==="p1") p1++;
else p2++;

document.getElementById("p1s").innerText=p1;
document.getElementById("p2s").innerText=p2;

updateCharts();
}

/* ===== グラフ ===== */
let c1=new Chart(document.getElementById("g1"),{
type:"pie",
data:{labels:["p1","p2"],datasets:[{data:[0,0]}]}
});

let c2=new Chart(document.getElementById("g2"),{
type:"pie",
data:{labels:["攻撃","ミス"],datasets:[{data:[0,0]}]}
});

let c3=new Chart(document.getElementById("g3"),{
type:"bar",
data:{labels:["攻撃","ミス"],datasets:[{data:[0,0]}]}
});

/* ===== 更新ロジック（追加だけ） ===== */
function updateCharts(){

let p1Count=dataLog.filter(d=>d.team==="p1").length;
let p2Count=dataLog.filter(d=>d.team==="p2").length;

c1.data.datasets[0].data=[p1Count,p2Count];
c1.update();

let atk=dataLog.filter(d=>d.type==="攻撃").length;
let miss=dataLog.filter(d=>d.type==="ミス").length;

c2.data.datasets[0].data=[atk,miss];
c2.update();

c3.data.datasets[0].data=[atk,miss];
c3.update();
}
</script>

</body>
</html>
