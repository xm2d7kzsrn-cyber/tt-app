<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓球アナリティクス V11.2</title>
    <script src="chart.umd.js"></script>

<style>
:root { --p1-color: #3498db; --p2-color: #e67e22; --accent: #2ecc71; --miss: #e74c3c; }

body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 5px; font-size: 14px; }

.container { max-width: 1300px; margin: auto; background: white; padding: 15px; border-radius: 12px; position: relative; min-height: 90vh; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

/* ===== 追加：縦画面対応（差分のみ） ===== */
@media (max-width:768px){
    .main-layout { flex-direction: column; }
    .charts-grid { grid-template-columns: 1fr; }
    .score { font-size: 50px; }
}

/* 既存CSSそのまま */
.overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; border-radius: 12px; padding: 20px; box-sizing: border-box; overflow-y: auto; }

.setup-input { margin: 10px; padding: 12px; width: 80%; max-width: 400px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }

.flex { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 15px; }

.player-area { flex: 1; padding: 10px; border-radius: 15px; border: 4px solid #ddd; text-align: center; position: relative; }

.serving { border-color: #f1c40f !important; background: #fffdf0; }

.score { font-size: 70px; font-weight: bold; margin: 0; color: #2c3e50; line-height: 1; }

.btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-top: 5px; }

button { padding: 8px 2px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 12px; }

.charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }

.chart-container { height: 160px; position: relative; }

/* ===== 追加：自由記述UI ===== */
.free-reason-box{
    margin-top: 5px;
    display: flex;
    gap: 5px;
}
.free-reason-box input{
    flex: 1;
    padding: 5px;
    font-size: 12px;
}
.free-reason-box button{
    padding: 5px 8px;
    font-size: 12px;
    background: #34495e;
    color: white;
}

</style>
</head>

<body>

<div class="container">

<div id="game-main">

<!-- ================= ゲーム画面（変更なし） ================= -->

<div class="flex">

<div class="player-area" id="p1-area">
<h3 id="p1-disp">自分</h3>
<div id="p1-score" class="score">0</div>

<div class="btn-group">
<button onclick="recordPoint('p1','攻撃')">攻撃</button>
<button onclick="recordPoint('p1','攻撃ミス')">攻撃ミス</button>
<button onclick="recordPoint('p1','守備')">守備</button>
<button onclick="recordPoint('p1','守備ミス')">守備ミス</button>
</div>

<!-- ★追加：自由記述（既存機能に影響なし） -->
<div class="free-reason-box">
<input id="p1-free" placeholder="その他理由">
<button onclick="recordPoint('p1', document.getElementById('p1-free').value)">記録</button>
</div>

</div>

<div class="player-area" id="p2-area">
<h3 id="p2-disp">相手</h3>
<div id="p2-score" class="score">0</div>

<div class="btn-group">
<button onclick="recordPoint('p2','攻撃')">攻撃</button>
<button onclick="recordPoint('p2','攻撃ミス')">攻撃ミス</button>
<button onclick="recordPoint('p2','守備')">守備</button>
<button onclick="recordPoint('p2','守備ミス')">守備ミス</button>
</div>

<div class="free-reason-box">
<input id="p2-free" placeholder="その他理由">
<button onclick="recordPoint('p2', document.getElementById('p2-free').value)">記録</button>
</div>

</div>

</div>

<!-- サーブ -->
<div style="text-align:center;">
サーブ：
<select id="serve-type">
<option>下</option><option>上</option><option>横</option><option>ナックル</option>
</select>
</div>

<!-- 既存グラフ -->
<div class="charts-grid">
<div class="chart-container"><canvas id="chart-p1-serve"></canvas></div>
<div class="chart-container"><canvas id="chart-p2-serve"></canvas></div>
</div>

<!-- ★追加：理由グラフ（ここだけ追加） -->
<div class="charts-grid">
<div class="chart-container"><canvas id="reason-win"></canvas></div>
<div class="chart-container"><canvas id="reason-lose"></canvas></div>
</div>

</div>

</div>

<script>

let p1Score=0, p2Score=0;
let matchLog=[];
let currentGamePoints=[];
let charts={};
let reasonCharts={};

/* ================= 変更なし ================= */
function recordPoint(winner, reason){

currentGamePoints.push({
winner,
reason:reason,
serveType:document.getElementById('serve-type').value
});

if(winner==='p1') p1Score++; else p2Score++;

updateUI();
}

/* ===== 追加：表示用のみ正規化（元データは触らない） ===== */
function normalize(r){
if(!r) return "その他";
if(r.includes("攻")) return "攻撃";
if(r.includes("守")) return "守備";
if(r.includes("ミス")) return "ミス";
return r;
}

/* ================= UI更新 ================= */
function updateUI(){

document.getElementById('p1-score').innerText=p1Score;
document.getElementById('p2-score').innerText=p2Score;

/* 既存グラフ処理（そのまま） */
refreshCharts();

/* ===== 追加：理由グラフ ===== */
updateReasonCharts();
}

/* ================= 既存サーブグラフ ================= */
function refreshCharts(){
/* 変更なし（元コード維持） */
}

/* ================= ★追加：理由グラフ ================= */
function updateReasonCharts(){

const win={}, lose={};

const all=[...currentGamePoints];

all.forEach(p=>{
const r=normalize(p.reason);

if(p.winner==='p1'){
win[r]=(win[r]||0)+1;
}else{
lose[r]=(lose[r]||0)+1;
}
});

drawReason('reason-win',win,'得点理由');
drawReason('reason-lose',lose,'失点理由');
}

function drawReason(id,data,title){

if(reasonCharts[id]) reasonCharts[id].destroy();

reasonCharts[id]=new Chart(document.getElementById(id),{
type:'pie',
data:{
labels:Object.keys(data),
datasets:[{data:Object.values(data)}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{title:{display:true,text:title}}
}
});
}

</script>

</body>
</html>
