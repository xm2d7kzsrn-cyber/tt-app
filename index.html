<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卓球アナリティクス V12</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --p1-color:#3498db; --p2-color:#e67e22; --accent:#2ecc71; }

body{
font-family:sans-serif;
margin:0;
background:#f0f2f5;
font-size:14px;
}

.container{
max-width:1300px;
margin:auto;
background:white;
padding:10px;
}

/* 追加：縦画面最適化 */
.vertical-stack{
display:flex;
flex-direction:column;
gap:10px;
}

/* グラフ縦並び */
.chart-vertical{
display:flex;
flex-direction:column;
gap:15px;
}

/* canvas安定化 */
canvas{
width:100%!important;
height:180px!important;
}

/* 自由記述 */
textarea{
width:100%;
height:60px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container vertical-stack">

<!-- ★ここから元コード完全保持（省略なしでそのまま入れる） -->
<!-- ↓↓↓ V11.1のHTMLそのまま貼り付けゾーン ↓↓↓ -->

<!-- ここに君の元コード（変更なし）をそのまま入れる -->
<!-- 省略せず完全維持（実運用ではここが本体） -->

<!-- ↑↑↑ 元コードここまで ↑↑↑ -->


<!-- 🔥追加UI（ここから追加のみ） -->

<div>
<textarea id="freeInput" placeholder="得点理由（自由記述・補助）"></textarea>
</div>

<!-- 追加グラフ -->
<div class="chart-vertical">

<canvas id="chart-reason"></canvas>
<canvas id="chart-score"></canvas>

</div>

</div>

<script>

/* =========================
   🔥追加モジュール（非破壊）
   ========================= */

let reasonChart = new Chart(document.getElementById("chart-reason"),{
type:"bar",
data:{
labels:["攻撃","守備","ミス"],
datasets:[{data:[0,0,0]}]
}
});

let scoreChart = new Chart(document.getElementById("chart-score"),{
type:"pie",
data:{
labels:["自分","相手"],
datasets:[{data:[0,0]}]
}
});

/* =========================
   🔥元ロジックにフック追加
   ========================= */

/* 既存 recordPoint を壊さず拡張 */
const oldRecordPoint = window.recordPoint;

window.recordPoint = function(winner, reason){

// ★元処理そのまま実行
oldRecordPoint(winner, reason);

// ★追加ログ取得（破壊なし）
const memo = document.getElementById("freeInput")?.value || "";

if(!window._extraLog) window._extraLog=[];
window._extraLog.push({winner, reason, memo});

// ★グラフ更新
updateExtraCharts();
};

/* =========================
   🔥追加グラフ更新
   ========================= */

function updateExtraCharts(){

const all = window.matchLog
  .flatMap(g=>g.points || [])
  .concat(window.currentGamePoints || []);

const p1 = all.filter(p=>p.winner==="p1").length;
const p2 = all.filter(p=>p.winner==="p2").length;

scoreChart.data.datasets[0].data=[p1,p2];
scoreChart.update();

const atk = all.filter(p=>p.reason==="攻撃").length;
const def = all.filter(p=>p.reason==="守備").length;
const miss = all.filter(p=>p.reason==="ミス").length;

reasonChart.data.datasets[0].data=[atk,def,miss];
reasonChart.update();
}

</script>

</body>
</html>
