<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卓球アナリティクス V12.0</title>
<script src="chart.umd.js"></script>

<style>
:root { --p1-color:#3498db; --p2-color:#e67e22; --accent:#2ecc71; }

body {
    font-family: sans-serif;
    margin:0;
    padding:5px;
    background:#f0f2f5;
    font-size:14px;
}

/* 縦画面対応 */
@media (max-width:768px){
    .main-layout{flex-direction:column;}
    .charts-grid{grid-template-columns:1fr;}
    .score{font-size:50px;}
}

.container{
    max-width:1300px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:12px;
    min-height:90vh;
}

/* overlay省略（変更なし） */

.flex{display:flex; gap:10px;}
.player-area{
    flex:1;
    border:4px solid #ddd;
    border-radius:12px;
    text-align:center;
    padding:10px;
}
.serving{border-color:#f1c40f;}

.score{
    font-size:70px;
    font-weight:bold;
}

.btn-group{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:5px;
}

button{
    font-size:12px;
    padding:6px;
    border:none;
    border-radius:4px;
}

/* グラフ */
.charts-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:10px;
}

.chart-container{height:160px;}

.free-reason-box{
    display:flex;
    gap:5px;
    margin-top:5px;
}

.free-reason-box input{
    flex:1;
    padding:5px;
    font-size:12px;
}

.free-reason-box button{
    background:#34495e;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- ================= GAME ================= -->
<div id="game-main">

<div class="flex">
<div class="player-area" id="p1-area">
<h3 id="p1-name">自分</h3>
<div id="p1-score" class="score">0</div>

<div class="btn-group">
<button onclick="recordPoint('p1','攻撃')">攻撃</button>
<button onclick="recordPoint('p1','守備')">守備</button>
<button onclick="recordPoint('p1','サーブ')">サーブ</button>
<button onclick="recordPoint('p1','ミス')">ミス</button>
</div>

<div class="free-reason-box">
<input id="p1-free" placeholder="その他">
<button onclick="recordPoint('p1', document.getElementById('p1-free').value)">記録</button>
</div>

</div>

<div class="player-area" id="p2-area">
<h3 id="p2-name">相手</h3>
<div id="p2-score" class="score">0</div>

<div class="btn-group">
<button onclick="recordPoint('p2','攻撃')">攻撃</button>
<button onclick="recordPoint('p2','守備')">守備</button>
<button onclick="recordPoint('p2','サーブ')">サーブ</button>
<button onclick="recordPoint('p2','ミス')">ミス</button>
</div>

<div class="free-reason-box">
<input id="p2-free" placeholder="その他">
<button onclick="recordPoint('p2', document.getElementById('p2-free').value)">記録</button>
</div>

</div>
</div>

<!-- サーブ -->
<div style="margin-top:10px;">
<select id="serve-type">
<option>下</option><option>上</option><option>横</option>
</select>
</div>

<!-- グラフ -->
<div class="charts-grid">
<div class="chart-container"><canvas id="chart1"></canvas></div>
<div class="chart-container"><canvas id="chart2"></canvas></div>
</div>

<!-- ★追加：理由分析 -->
<div class="charts-grid">
<div class="chart-container"><canvas id="reason-win"></canvas></div>
<div class="chart-container"><canvas id="reason-lose"></canvas></div>
</div>

</div>

</div>

<script>

/* ================= 正規化 ================= */

const REASON_MAP = {
"攻撃":["攻撃","スマッシュ","ドライブ"],
"守備":["守備","ブロック"],
"サーブ":["サーブ","サービスエース"],
"ミス":["ミス","ミス攻撃","ミス守備"],
"その他":[]
};

function normalizeReason(input){
if(!input) return "その他";

input = input.trim();

for(const k in REASON_MAP){
if(REASON_MAP[k].includes(input)) return k;
}

if(input.includes("攻")) return "攻撃";
if(input.includes("守")) return "守備";
if(input.includes("サーブ")) return "サーブ";
if(input.includes("ミス")) return "ミス";

return "その他";
}

/* ================= データ ================= */

let data = [];

let p1=0,p2=0;

/* ================= 記録 ================= */

function recordPoint(winner, reason){

const norm = normalizeReason(reason);

data.push({
winner,
reason:norm,
raw:reason,
serve:document.getElementById("serve-type").value
});

if(winner==="p1")p1++; else p2++;

update();
}

/* ================= 更新 ================= */

function update(){

document.getElementById("p1-score").innerText=p1;
document.getElementById("p2-score").innerText=p2;

/* 集計 */
const win = {};
const lose = {};

data.forEach(d=>{
if(d.winner==="p1") win[d.reason]=(win[d.reason]||0)+1;
else lose[d.reason]=(lose[d.reason]||0)+1;
});

/* グラフ */
draw("reason-win",win);
draw("reason-lose",lose);
}

/* ================= グラフ ================= */

function draw(id,obj){

if(window[id]) window[id].destroy();

window[id]=new Chart(document.getElementById(id),{
type:"pie",
data:{
labels:Object.keys(obj),
datasets:[{data:Object.values(obj)}]
}
});
}

</script>

</body>
</html>
