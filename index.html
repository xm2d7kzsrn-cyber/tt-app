<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卓球アナリティクス V13</title>

<!-- ★安定版CDN（ここ重要） -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f0f2f5;
font-size:14px;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
background:white;
}

.score{
display:flex;
justify-content:center;
font-size:40px;
font-weight:bold;
gap:10px;
}

.btn{
padding:8px;
margin:3px;
border:none;
border-radius:6px;
font-size:12px;
}

.p1{background:#3498db;color:#fff;}
.p2{background:#e67e22;color:#fff;}

textarea{
width:100%;
height:60px;
margin-top:5px;
}

.chartBox{
display:flex;
flex-direction:column;
gap:20px;
margin-top:15px;
}

.chartWrap{
height:220px;
position:relative;
}

canvas{
width:100%!important;
height:100%!important;
}
</style>
</head>

<body>

<div class="container">

<!-- スコア -->
<div class="score">
<div id="p1">0</div>
<div>:</div>
<div id="p2">0</div>
</div>

<!-- 入力 -->
<div>
<button class="btn p1" onclick="add('p1','攻撃')">攻撃</button>
<button class="btn p1" onclick="add('p1','ミス')">ミス</button>

<button class="btn p2" onclick="add('p2','攻撃')">攻撃</button>
<button class="btn p2" onclick="add('p2','ミス')">ミス</button>

<textarea id="memo" placeholder="自由記述（理由）"></textarea>
</div>

<!-- グラフ（縦並び） -->
<div class="chartBox">

<div class="chartWrap">
<canvas id="chart1"></canvas>
</div>

<div class="chartWrap">
<canvas id="chart2"></canvas>
</div>

<div class="chartWrap">
<canvas id="chart3"></canvas>
</div>

</div>

</div>

<script>

let p1=0,p2=0;

/* ===== データ一元管理 ===== */
let log=[];

/* ===== 得点処理（絶対触らない） ===== */
function add(team,type){

log.push({
team:team,
type:type,
memo:document.getElementById("memo").value
});

if(team==="p1")p1++;
else p2++;

document.getElementById("p1").innerText=p1;
document.getElementById("p2").innerText=p2;

update();
}

/* ===== グラフ安全生成 ===== */
function createChart(id,type,data,labels){
return new Chart(document.getElementById(id),{
type:type,
data:{
labels:labels,
datasets:[{
data:data,
backgroundColor:["#3498db","#e67e22","#2ecc71","#f1c40f"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});
}

/* ===== 初期化 ===== */
let c1=createChart("chart1","pie",[0,0],["p1","p2"]);
let c2=createChart("chart2","pie",[0,0],["攻撃","ミス"]);
let c3=createChart("chart3","bar",[0,0],["攻撃","ミス"]);

/* ===== 更新処理 ===== */
function update(){

// 得点
let p1c=log.filter(d=>d.team==="p1").length;
let p2c=log.filter(d=>d.team==="p2").length;

c1.data.datasets[0].data=[p1c,p2c];
c1.update();

// 攻撃・ミス
let atk=log.filter(d=>d.type==="攻撃").length;
let miss=log.filter(d=>d.type==="ミス").length;

c2.data.datasets[0].data=[atk,miss];
c2.update();

c3.data.datasets[0].data=[atk,miss];
c3.update();
}

</script>

</body>
</html>
