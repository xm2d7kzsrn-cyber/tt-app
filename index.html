<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卓球アナリティクス V11.2</title>
<script src="chart.umd.js"></script>

<style>
:root { --p1-color:#3498db; --p2-color:#e67e22; --accent:#2ecc71; --miss:#e74c3c; }

body{
    font-family:sans-serif;
    background:#f0f2f5;
    margin:0;
    padding:5px;
    font-size:14px;
}

.container{
    max-width:1300px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:12px;
    min-height:90vh;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* =========================
   ★追加：縦画面レイアウト
========================= */
.main-layout{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

@media (max-width:768px){
    .main-layout{
        flex-direction:column;
    }
    .charts-grid{
        grid-template-columns:1fr !important;
    }
}

/* 既存維持 */
.flex{
    display:flex;
    justify-content:space-around;
    gap:10px;
}

/* =========================
   ★追加：自由記述エリア
========================= */
.free-reason{
    width:100%;
    margin:10px 0;
}

.free-reason input{
    width:100%;
    padding:8px;
    font-size:13px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* =========================
   グラフ（既存＋拡張）
========================= */
.charts-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:15px;
}

.chart-wrapper{
    background:#fff;
    padding:10px;
    border:1px solid #eee;
    border-radius:8px;
}

.chart-container{
    height:160px;
}
</style>
</head>

<body>

<div class="container">

<div id="game-main">

<div class="main-layout">

<!-- 左側 -->
<div class="game-controls">

<!-- ★追加：自由記述（既存影響なし） -->
<div class="free-reason">
<input id="free-reason-input" placeholder="得点の自由記述（任意）">
</div>

<!-- ===== 既存UIそのまま ===== -->
<div class="flex">

<div>
<h3>自分</h3>
<div id="p1-score">0</div>
<button onclick="recordPoint('p1','攻撃')">攻撃</button>
<button onclick="recordPoint('p1','加点')">得点</button>
</div>

<div>
<h3>相手</h3>
<div id="p2-score">0</div>
<button onclick="recordPoint('p2','攻撃')">攻撃</button>
<button onclick="recordPoint('p2','失点')">失点</button>
</div>

</div>

<!-- サーブ -->
<select id="serve-type">
<option>下</option>
<option>上</option>
<option>横</option>
</select>

<!-- =========================
     ★追加：リアルタイム理由グラフ
========================= -->
<div class="charts-grid">

<div class="chart-wrapper">
<canvas id="chart-p1-reason"></canvas>
<div>自分：得点理由</div>
</div>

<div class="chart-wrapper">
<canvas id="chart-p2-reason"></canvas>
<div>相手：失点理由</div>
</div>

</div>

</div>

<!-- 右 -->
<div class="stats-sidebar">
<h4>統計</h4>
<table id="stats-table"></table>
</div>

</div>

</div>

<script>

/* ===== 既存変数そのまま ===== */
let p1Score=0,p2Score=0;
let currentGamePoints=[];

/* ★追加のみ */
let reasonData = {
    p1:{},
    p2:{}
};

let charts={};

/* =========================
   ⚠ ここ重要：既存ロジックは一切変更しない
========================= */
function recordPoint(winner, reason){

    const freeText = document.getElementById('free-reason-input').value;

    currentGamePoints.push({
        winner,
        reason,
        serveType: document.getElementById('serve-type').value,
        freeText
    });

    if(winner==='p1') p1Score++; else p2Score++;

    /* ★追加：理由集計 */
    if(!reasonData[winner][reason]){
        reasonData[winner][reason]=0;
    }
    reasonData[winner][reason]++;

    updateUI();
}

/* =========================
   UI（既存維持）
========================= */
function updateUI(){
    document.getElementById('p1-score').innerText=p1Score;
    document.getElementById('p2-score').innerText=p2Score;

    updateCharts();
}

/* =========================
   ★追加：理由グラフ更新
========================= */
function updateCharts(){

    const build = (obj)=>{
        return {
            labels:Object.keys(obj),
            data:Object.values(obj)
        };
    };

    const p1 = build(reasonData.p1);
    const p2 = build(reasonData.p2);

    if(!charts.p1){
        charts.p1 = new Chart(
            document.getElementById('chart-p1-reason'),
            {type:'pie',data:{labels:[],datasets:[{data:[]}]}}
        );

        charts.p2 = new Chart(
            document.getElementById('chart-p2-reason'),
            {type:'pie',data:{labels:[],datasets:[{data:[]}]}}
        );
    }

    charts.p1.data.labels = p1.labels;
    charts.p1.data.datasets[0].data = p1.data;
    charts.p1.update();

    charts.p2.data.labels = p2.labels;
    charts.p2.data.datasets[0].data = p2.data;
    charts.p2.update();
}

</script>

</body>
</html>
